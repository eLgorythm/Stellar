# Batasi Heap ke 3GB atau 4GB agar sisa RAM bisa digunakan Browser/Sistem
org.gradle.jvmargs=-Xmx3G -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true
org.gradle.daemon=true
org.gradle.parallel=true

# Batasi jumlah core yang bekerja agar tidak boros RAM
# 4 thread sudah cukup untuk multitasking 8GB RAM
org.gradle.workers.max=4
